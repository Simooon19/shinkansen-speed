  function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

  var navlow = (navigator.language || 'en').toLowerCase();
  var nav2 = navlow.slice(0, 2);
  var autoLang = (nav2 === 'zh' && /(tw|hk|mo|hant)/.test(navlow)) ? 'zht' : nav2;
  var lang = lsGet('shinkansen.lang') || (I18N[autoLang] ? autoLang : 'en');
  if (!I18N[lang]) lang = 'en';
  var IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  function t(key) { return (I18N[lang] && I18N[lang][key]) || I18N.en[key] || ''; }

  // ---------- gauge config ----------
  var SCALES = {
    150: { minor: 10, label: 50 },
    350: { minor: 25, label: 100 },
    600: { minor: 50, label: 200 },
    1000: { minor: 50, label: 200 }
  };
  var AUTO_TIERS = [150, 350, 600, 1000];
  var savedScale = lsGet('shinkansen.scale');
  var scaleMode = (savedScale && SCALES[parseInt(savedScale, 10)]) ? parseInt(savedScale, 10) : 'auto';
  var MAX_KMH = scaleMode === 'auto' ? AUTO_TIERS[0] : scaleMode;

  var SWEEP = 240;            // degrees of arc
  var START_DEG = -120;       // 0 km/h position (0° = up)
  var CX = 150, CY = 150, R = 120;

  var els = {
    speed: document.getElementById('speedVal'),
    max: document.getElementById('maxVal'),
    avg: document.getElementById('avgVal'),
    dist: document.getElementById('distVal'),
    acc: document.getElementById('accVal'),

  var DONATE_URL = 'https://buymeacoffee.com/Simooon19';
  if (DONATE_URL) {
    document.getElementById('coffeeLink').href = DONATE_URL;
    document.getElementById('coffeeWrap').classList.remove('hidden');
  }

  // ---------- gauge geometry ----------
  function polar(deg, r) {
    var a = (deg - 90) * Math.PI / 180;
    return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
  }
  function arcPath(fromDeg, toDeg, r) {
    var p1 = polar(fromDeg, r), p2 = polar(toDeg, r);
    var large = (toDeg - fromDeg) > 180 ? 1 : 0;
    return 'M ' + p1[0] + ' ' + p1[1] + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + p2[0] + ' ' + p2[1];
  }

  els.arcBg.setAttribute('d', arcPath(START_DEG, START_DEG + SWEEP, R));
  els.arcFg.setAttribute('d', arcPath(START_DEG, START_DEG + SWEEP, R));
  var ARC_LEN = els.arcFg.getTotalLength();
  els.arcFg.style.strokeDasharray = ARC_LEN;
  els.arcFg.style.strokeDashoffset = ARC_LEN;

  var svgns = 'http://www.w3.org/2000/svg';
  function rebuildTicks() {
    while (els.ticks.firstChild) els.ticks.removeChild(els.ticks.firstChild);
    var cfg = SCALES[MAX_KMH];
    for (var v = 0; v <= MAX_KMH; v += cfg.minor) {
      var deg = START_DEG + (v / MAX_KMH) * SWEEP;
      var major = v % (cfg.minor * 2) === 0;
      var o = polar(deg, R + 11), i = polar(deg, R + (major ? 3 : 7));
      var line = document.createElementNS(svgns, 'line');
      line.setAttribute('x1', o[0]); line.setAttribute('y1', o[1]);
      line.setAttribute('x2', i[0]); line.setAttribute('y2', i[1]);
      line.setAttribute('stroke', major ? 'rgba(232,237,247,0.5)' : 'rgba(232,237,247,0.2)');
      line.setAttribute('stroke-width', major ? 2 : 1);
      els.ticks.appendChild(line);
      if (v % cfg.label === 0) {
        var tp = polar(deg, R + 24);
        var txt = document.createElementNS(svgns, 'text');
        txt.setAttribute('x', tp[0]); txt.setAttribute('y', tp[1]);
        txt.setAttribute('fill', 'rgba(147,163,189,0.8)');
        txt.setAttribute('font-size', '11');
        txt.setAttribute('text-anchor', 'middle');
        txt.setAttribute('dominant-baseline', 'middle');
        txt.textContent = v;
        els.ticks.appendChild(txt);
      }
    }
  }

  function applyLang() {
    document.documentElement.lang = lang;
    els.langSel.value = lang;
    els.ovText.textContent = t('ovText');
    els.startBtn.textContent = t('start');

    els.status.className = statusErr ? 'err' : '';
    els.lbBtn.textContent = '🏆 ' + t('lbTitle');
    els.lbTitle.textContent = '🏆 ' + t('lbTitle');
    els.lbName.placeholder = t('lbNamePh');
    els.lbSend.textContent = t('lbSend');

    var tabMap = { today: 'lbToday', week: 'lbWeek', month: 'lbMonth', alltime: 'lbAll' };
    var tabs = document.querySelectorAll('.lb-tab');
    for (var ti = 0; ti < tabs.length; ti++) {
      tabs[ti].textContent = t(tabMap[tabs[ti].getAttribute('data-p')]);

  els.langSel.addEventListener('change', function () {
    lang = els.langSel.value;
    lsSet('shinkansen.lang', lang);
    applyLang();
  });
  applyLang();

  function haversine(lat1, lon1, lat2, lon2) {
    var rad = Math.PI / 180, R_E = 6371000;
    var dLat = (lat2 - lat1) * rad, dLon = (lon2 - lon1) * rad;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return 2 * R_E * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // ---------- milestones ----------
  var MILESTONES = [200, 285, 320, 500];
  var msHit = {};

  function toast(msg) {
    var d = document.createElement('div');
    d.className = 'toast';
    d.textContent = msg;
    document.body.appendChild(d);
    setTimeout(function () { d.classList.add('show'); }, 20);

  function confetti() {
    var c = document.createElement('canvas');
    c.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:25';
    document.body.appendChild(c);
    var dpr = window.devicePixelRatio || 1;
    c.width = window.innerWidth * dpr; c.height = window.innerHeight * dpr;
    var ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
    var cols = ['#8ee8d2', '#ff8fb1', '#ffd166', '#7fd1c0', '#ffffff'];
    var ps = [];
    for (var i = 0; i < 90; i++) {
      ps.push({
        x: window.innerWidth / 2, y: window.innerHeight * 0.35,
        vx: (Math.random() - 0.5) * 10, vy: -Math.random() * 9 - 3,
        s: Math.random() * 5 + 3, c: cols[i % cols.length],
        r: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3, life: 110
      });
    }
    (function tick() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      var alive = false;
      for (var j = 0; j < ps.length; j++) {
        var p = ps[j];
        if (p.life <= 0 || p.y > window.innerHeight + 20) continue;
        p.vy += 0.25; p.x += p.vx; p.y += p.vy; p.r += p.vr; p.life--;
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.r);
        ctx.globalAlpha = Math.min(1, p.life / 40);
        ctx.fillStyle = p.c;
        ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6);
        ctx.restore();
      }
      if (alive) requestAnimationFrame(tick);
      else document.body.removeChild(c);
    })();
  }

  // ---------- despike: en ensam avvikare är en glitch, inte fysik ----------
  // Shinkansen accelererar max ~2,6 km/h per sekund; >12 km/h/s är omöjligt för tåg.
  // Första avvikande samplet slängs; bekräftar nästa sample nivån är förändringen verklig.
  var dsLastKmh = null, dsLastT = 0, dsSuspect = null;
  function despike(kmh) {
    var now = Date.now();
    if (dsLastKmh !== null) {
      var dt = (now - dsLastT) / 1000;
      if (dt > 0 && dt < 5) {
        var maxDelta = 12 * dt + 3;
        if (Math.abs(kmh - dsLastKmh) > maxDelta) {
          if (dsSuspect !== null && Math.abs(kmh - dsSuspect.kmh) <= 12 * ((now - dsSuspect.t) / 1000) + 3) {
            dsSuspect = null;                // två i rad på nya nivån → verklig
            dsLastKmh = kmh; dsLastT = now;
            return kmh;
          }
          dsSuspect = { kmh: kmh, t: now };
          return null;                       // släng den ensamma spiken
        }
      }
    }
    dsSuspect = null;
    dsLastKmh = kmh; dsLastT = now;
    return kmh;
  }

  // ---------- measurement ----------
  function ingest(kmh, accM, distM, dtS, real) {
    if (kmh < 1) kmh = 0;                    // GPS-brus vid stillastående
    if (kmh > 1300) return;                  // orimligt — släng
    var filtered = despike(kmh);
    if (filtered === null) {
      if (accM != null) els.acc.innerHTML = '±' + Math.round(accM) + '<small>m</small>';
      return;                                // spik under utredning — vänta på bekräftelse
    }
    kmh = filtered;
    if (real && accM != null && accM <= 60) {
      // mätspår för topplistan (endast riktig GPS, aldrig demo)
      sessionSamples.push({ t: Date.now(), kmh: Math.round(kmh * 10) / 10, acc: Math.round(accM) });
      var sCut = Date.now() - 15 * 60 * 1000;
      while (sessionSamples.length && sessionSamples[0].t < sCut) sessionSamples.shift();
      if (kmh > bestReal) bestReal = kmh;
    }
    targetKmh = kmh;
    if (kmh > maxKmh) maxKmh = kmh;
    if (scaleMode === 'auto') {
      var tier = autoTier();
      if (tier !== MAX_KMH) applyScale(tier);   // väx skalan när farten kräver det
    }
    for (var mi = 0; mi < MILESTONES.length; mi++) {
      if (kmh >= MILESTONES[mi] && !msHit[MILESTONES[mi]]) {
        msHit[MILESTONES[mi]] = true;
        toast('🎉 ' + MILESTONES[mi] + ' km/h!');
        confetti();
      }
    }
    if (distM != null && distM > 0) totalDistM += distM;
    if (dtS != null && dtS > 0 && dtS < 60 && kmh > 2) movingTimeS += dtS;
    history.push({ t: Date.now(), kmh: kmh });
    var cutoff = Date.now() - HISTORY_MS;
    while (history.length && history[0].t < cutoff) history.shift();
    if (accM != null) {
      els.acc.innerHTML = '±' + Math.round(accM) + '<small>m</small>';
    }
    updateStats();
  }

  var speedAnchor = null;   // referensfix för distans + fallback-fart

  function onPosition(pos) {
    var c = pos.coords;
    var ts = pos.timestamp;
    var kmh = null, distM = null, dtS = null;
    var dopplerOk = typeof c.speed === 'number' && !isNaN(c.speed) && c.speed >= 0;
    if (dopplerOk) kmh = c.speed * 3.6;      // Doppler-hastighet: bäst

    if (c.accuracy <= 100) {
      var gap = speedAnchor ? (ts - speedAnchor.t) / 1000 : null;
      if (!speedAnchor || gap <= 0 || gap >= 60) {
        // nytt segment: första fixen, klockhopp eller långt glapp (tunnel)
        speedAnchor = { lat: c.latitude, lon: c.longitude, t: ts, acc: c.accuracy };
      } else if (gap >= 1) {
        var d = haversine(speedAnchor.lat, speedAnchor.lon, c.latitude, c.longitude);
        var noise = c.accuracy + speedAnchor.acc;   // brusgolv: kombinerad osäkerhet
        if (d > noise) { distM = d; dtS = gap; }
        if (!dopplerOk) kmh = d > noise ? (d / gap) * 3.6 : 0;
        speedAnchor = { lat: c.latitude, lon: c.longitude, t: ts, acc: c.accuracy };
      }
      // gap < 1 s: behåll ankaret, vänta in nästa fix
    }

    if (kmh != null) {
      ingest(kmh, c.accuracy, distM, dtS, true);
      setStatus(kmh < 1 ? 'fixOkMove' : 'live');
    } else {
      els.acc.innerHTML = '±' + Math.round(c.accuracy) + '<small>m</small>';
      // > 500 m = mobilmast/Wi-Fi-position, ingen satellitkontakt än — ge en hjälpande hint
      setStatus(c.accuracy > 500 ? 'coarse' : 'fixOkSpeed');
    }
  }

  function onGeoError(err) {
    if (err.code === 1) setStatus(IS_IOS ? 'deniedIos' : 'denied', true);
    else if (maxKmh > 50) setStatus('tunnel', false);   // signal borta i farten = troligen tunnel
    else if (err.code === 2) setStatus('unavailable', true);
    else setStatus('timeout', true);
  }

  function startGPS() {
    if (!('geolocation' in navigator)) {
      setStatus('noGeo', true);
      return;
    }
    measuring = true;
    setStatus('fixWait');
    navigator.geolocation.watchPosition(onPosition, onGeoError, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 20000
    });
    requestWakeLock();
  }

  // ---------- demo mode ----------
  function demoParam(name, def, min, max) {
    var m = location.search.match(new RegExp('[?&]' + name + '=([0-9.]+)'));
    var v = m ? parseFloat(m[1]) : def;
    return isFinite(v) ? Math.min(max, Math.max(min, v)) : def;
  }

  function startDemo() {
    var t0 = Date.now();
    measuring = true;
    if (demoTimer) clearInterval(demoTimer);
    setStatus('');                                            // ingen statusrad i demo —
    els.acc.textContent = 'DEMO';                             // markören sitter i GPS-rutan istället
    var accel = demoParam('accel', 9, 0.5, 50);               // km/h per sekund (äkta Shinkansen ≈ 2.6)
    var startKmh = demoParam('start', 0, 0, 340);             // börja i fart för kortare tagningar
    for (var mi = 0; mi < MILESTONES.length; mi++) {
      if (MILESTONES[mi] <= startKmh + 5) msHit[MILESTONES[mi]] = true;   // ingen retro-konfetti vid start i fart
    }
    demoTimer = setInterval(function () {
      var el = (Date.now() - t0) / 1000;
      var demoTop = scaleMode === 'auto' ? 285 : MAX_KMH * 0.82;
      if (demoTop < startKmh) demoTop = startKmh;
      var base = Math.min(demoTop, startKmh + el * accel);    // accelerera mot Shinkansen-fart / ~82 % av vald skala
      var kmh = Math.max(0, base + Math.sin(el / 7) * 8 + Math.sin(el / 2.3) * 2);  // deterministisk, mjuk våg
      ingest(kmh, null, kmh / 3.6 * 0.2, 0.2);
    }, 200);
    requestWakeLock();
  }

  // ---------- wake lock ----------

    if (!('wakeLock' in navigator)) return;

    }).catch(function () { wakeLock = null; /* t.ex. strömsparläge — vi försöker igen nedan */ });
  }
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && measuring) requestWakeLock();

  setInterval(function () {
    if (measuring && !wakeLock && document.visibilityState === 'visible') requestWakeLock();

  var chartDrawn = false;
  function drawChart() {
    var canvas = els.chart;
    var dpr = window.devicePixelRatio || 1;
    var w = canvas.clientWidth, h = canvas.clientHeight;
    if (canvas.width !== w * dpr) { canvas.width = w * dpr; canvas.height = h * dpr; }
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (history.length < 2) {
      if (chartDrawn) { ctx.clearRect(0, 0, w, h); chartDrawn = false; }
      return;
    }
    ctx.clearRect(0, 0, w, h);
    chartDrawn = true;

    var now = Date.now();
    var yMax = Math.max(100, maxKmh * 1.1);
    ctx.beginPath();
    for (var i = 0; i < history.length; i++) {
      var x = w - ((now - history[i].t) / HISTORY_MS) * w;
      var y = h - 4 - (history[i].kmh / yMax) * (h - 10);
      // bryt linjen över GPS-glapp (tunnlar) i stället för att rita en falsk interpolation
      if (i === 0 || history[i].t - history[i - 1].t > 10000) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#7fd1c0';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.stroke();
    // fyllning under linjen
    var last = history[history.length - 1];
    var lastX = w - ((now - last.t) / HISTORY_MS) * w;
    var firstX = w - ((now - history[0].t) / HISTORY_MS) * w;
    ctx.lineTo(lastX, h); ctx.lineTo(firstX, h); ctx.closePath();
    ctx.fillStyle = 'rgba(127, 209, 192, 0.12)';
    ctx.fill();
  }

  // ---------- speed-reactive visuals ----------
  var slCanvas = document.getElementById('speedlines');
  var slParts = [];
  var slWasActive = false;

  function lerpColor(f) {
    // teal → guld → rosa
    var c1, c2, t2;
    if (f < 0.5) { c1 = [89, 201, 173]; c2 = [255, 209, 102]; t2 = f / 0.5; }
    else { c1 = [255, 209, 102]; c2 = [255, 143, 177]; t2 = (f - 0.5) / 0.5; }
    return [
      Math.round(c1[0] + (c2[0] - c1[0]) * t2),
      Math.round(c1[1] + (c2[1] - c1[1]) * t2),
      Math.round(c1[2] + (c2[2] - c1[2]) * t2)
    ];
  }

  function drawSpeedLines(kmh) {
    var dpr = window.devicePixelRatio || 1;
    var w = window.innerWidth, h = window.innerHeight;
    if (slCanvas.width !== w * dpr || slCanvas.height !== h * dpr) {
      slCanvas.width = w * dpr; slCanvas.height = h * dpr;
    }
    var ctx = slCanvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var intensity = Math.min(1, Math.max(0, (kmh - 30) / 170));  // fadear in 30→200 km/h
    if (intensity <= 0) {
      if (slWasActive) { ctx.clearRect(0, 0, w, h); slWasActive = false; }
      return;
    }
    slWasActive = true;
    ctx.clearRect(0, 0, w, h);
    if (!slParts.length) {
      for (var i = 0; i < 26; i++) {
        slParts.push({ x: Math.random() * w, y: Math.random() * h, d: 0.4 + Math.random() * 0.8 });
      }
    }
    var v = 2 + kmh * 0.09;
    var len = 18 + kmh * 0.28;
    var col = lerpColor(Math.min(1, kmh / 320));
    for (var j = 0; j < slParts.length; j++) {
      var p = slParts[j];
      p.x -= v * p.d;
      if (p.x < -len) { p.x = w + 30; p.y = Math.random() * h; }
      ctx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (0.12 * intensity * p.d).toFixed(3) + ')';
      ctx.lineWidth = p.d * 1.6;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + len * p.d, p.y);
      ctx.stroke();
    }
  }

  var lastFrameTs = 0;
  function frame(ts) {
    requestAnimationFrame(frame);
    var dt = lastFrameTs ? Math.min(0.1, (ts - lastFrameTs) / 1000) : 0.016;
    lastFrameTs = ts;
    // spara batteri: gör ingenting innan mätningen startat och allt står stilla
    if (!measuring && targetKmh === 0 && displayKmh === 0) return;

    // mjuk animering mot senaste mätvärdet (framerate-oberoende)
    displayKmh += (targetKmh - displayKmh) * (1 - Math.exp(-7 * dt));
    if (Math.abs(displayKmh - targetKmh) < 0.05) displayKmh = targetKmh;

    els.speed.textContent = Math.round(displayKmh);

    // glöd som skiftar färg och intensitet med farten (fullt utslag vid 320 km/h)
    var gf = Math.min(1, displayKmh / 320);
    var gc = lerpColor(gf);
    els.speed.style.textShadow = '0 0 ' + Math.round(24 + gf * 32) + 'px rgba(' +
      gc[0] + ',' + gc[1] + ',' + gc[2] + ',' + (0.3 + gf * 0.45).toFixed(2) + ')';

    drawSpeedLines(displayKmh);
    els.subSpeed.textContent = Math.round(displayKmh * 0.621371) + ' mph ・ ' +
      Math.round(displayKmh / 3.6) + ' m/s ・ M ' + (displayKmh / 3.6 / 343).toFixed(2);

    var frac = Math.min(1, Math.max(0, displayKmh / MAX_KMH));
    els.arcFg.style.strokeDashoffset = ARC_LEN * (1 - frac);
    if (frac > 0.003) {
      var p = els.arcFg.getPointAtLength(ARC_LEN * frac);
      els.dot.setAttribute('cx', p.x);
      els.dot.setAttribute('cy', p.y);
      els.dot.setAttribute('opacity', '1');
    } else {
      els.dot.setAttribute('opacity', '0');
    }

    drawChart();
  }
  requestAnimationFrame(frame);

    els.lbSend.disabled = true;
    fetch(LB_URL + '/shinkansen-submit', {
      method: 'POST',
      headers: lbHeaders(),
      body: JSON.stringify({ name: name, kmh: maxK, samples: win })
    }).then(function (r) {
      return r.json().then(function (j) { return { status: r.status, j: j }; });
    }).then(function (res) {
      els.lbSend.disabled = false;
      if (res.j && res.j.ok) {
        lbFetch();
        els.lbNote.textContent = t('lbSent').replace('{r}', res.j.rank);
      } else {
        els.lbNote.textContent = res.status === 429 ? t('lbRate') : t('lbFail');
      }
    }).catch(function () {
      els.lbSend.disabled = false;
      els.lbNote.textContent = t('lbError');
    });
  }

  els.lbBtn.addEventListener('click', function () {
    els.lbPanel.classList.remove('hidden');
    els.lbNote.textContent = '';
    els.lbList.innerHTML = '';
    var loading = document.createElement('li');
    loading.className = 'lb-empty';
    loading.textContent = '…';
    els.lbList.appendChild(loading);
    lbFetch();
  });
  els.lbClose.addEventListener('click', function () {
    els.lbPanel.classList.add('hidden');
  });
  var lbTabs = document.querySelectorAll('.lb-tab');
  for (var lti = 0; lti < lbTabs.length; lti++) {
    (function (tab) {
      tab.addEventListener('click', function () {
        lbPeriod = tab.getAttribute('data-p');
        for (var x = 0; x < lbTabs.length; x++) {
          lbTabs[x].className = 'lb-tab' + (lbTabs[x] === tab ? ' active' : '');
        }
        renderLb();
      });
    })(lbTabs[lti]);
  }
  els.lbSend.addEventListener('click', lbSubmit);
  els.lbName.value = lsGet('shinkansen.name') || '';

  // ---------- start ----------
  var DEMO = /[?&]demo=1/.test(location.search);   // dolt testläge: ?demo=1
  els.startBtn.addEventListener('click', function () {
    els.overlay.classList.add('hidden');
    if (DEMO) startDemo(); else startGPS();
  });
})();
</script>
</body>
</html>
