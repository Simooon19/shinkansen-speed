<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG image template — 1200x630</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    background: radial-gradient(1400px 900px at 50% -20%, #14213d 0%, #0b1220 55%, #070b14 100%);
    color: #e8edf7;
    display: flex; align-items: center; gap: 40px;
    padding: 0 70px;
  }
  .gauge { position: relative; width: 440px; flex: none; }
  .gauge svg { width: 100%; display: block; }
  .readout {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding-top: 90px;
  }
  .speed { font-size: 120px; font-weight: 800; line-height: 1; letter-spacing: -0.02em;
           text-shadow: 0 0 40px rgba(127, 209, 192, 0.4); }
  .unit { font-size: 24px; color: #93a3bd; letter-spacing: 0.3em; margin-top: 8px; text-indent: 0.3em; }
  .text { display: flex; flex-direction: column; justify-content: center; }
  .kanji { font-size: 26px; letter-spacing: 0.5em; color: #7fd1c0; margin-bottom: 16px; }
  h1 { font-size: 58px; font-weight: 800; line-height: 1.15; letter-spacing: -0.01em; }
  .sub { font-size: 26px; color: #93a3bd; margin-top: 18px; line-height: 1.4; }
  .pill {
    display: inline-block; margin-top: 30px; align-self: flex-start;
    font-size: 23px; font-weight: 600; color: #8ee8d2;
    background: rgba(127, 209, 192, 0.12);
    border: 2px solid rgba(127, 209, 192, 0.5);
    border-radius: 999px; padding: 12px 30px;
  }
</style>
</head>
<body>
  <div class="gauge">
    <svg viewBox="0 0 300 234">
      <defs>
        <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#59c9ad"/>
          <stop offset="60%" stop-color="#7fd1c0"/>
          <stop offset="100%" stop-color="#ff8fb1"/>
        </linearGradient>
      </defs>
      <path d="M 46.08 210 A 120 120 0 1 1 253.92 210" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="14" stroke-linecap="round"/>
      <path d="M 46.08 210 A 120 120 0 1 1 266.13 119.75" fill="none" stroke="url(#g)" stroke-width="14" stroke-linecap="round"/>
      <circle cx="266.13" cy="119.75" r="8" fill="#fff"/>
    </svg>
    <div class="readout">
      <div class="speed">285</div>
      <div class="unit">KM/H</div>
    </div>
  </div>
  <div class="text">
    <div class="kanji">新幹線</div>
    <h1>How fast is your Shinkansen going right now?</h1>
    <div class="sub">Live GPS speedometer in your browser.<br>Free — no app, 8 languages. 🚄</div>
    <div class="pill">simooon19.github.io/shinkansen-speed</div>
  </div>
</body>
</html>
